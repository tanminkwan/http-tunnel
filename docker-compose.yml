version: "3.8"

services:
  # 1. Nginx Gateway (실제 요청을 받는 관문)
  nginx-gateway:
    build: ./nginx
    ports:
      - "40080:80"
    depends_on:
      - tunnel-server
    networks:
      - tunnel-net

  # 2. HTTP 터널 서버 (Server-side)
  tunnel-server:
    build: ./server
    environment:
      AUTH_TOKEN: test-token-123
      HTTP_PORT: "8080"
      PUBLIC_PORT: "9000"
    networks:
      - tunnel-net

  # 3. HTTP 터널 클라이언트 (Client-side / 내부망)
  tunnel-client:
    build: ./client
    environment:
      SERVER_URL: http://tunnel-server:8080
      AUTH_TOKEN: test-token-123
      LOCAL_HOST: flask-client
      LOCAL_PORT: "5000"
    depends_on:
      - tunnel-server
      - flask-client
    networks:
      - tunnel-net

  # 4. 내부망 (Client-side) Flask App (터널을 거쳐 노출될 실제 로컬 서비스)
  flask-client:
    build: ./flask-client
    networks:
      - tunnel-net

networks:
  tunnel-net:
    driver: bridge
